apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  #these labels are replicaset lables
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector: 
    # using these labels replicaset selects the pod
      matchLabels:
        project: roboshop
        tier: backend
        component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
    spec:
      containers:
      - name: catalogue 
        image: {{ .Values.deployment.imageName}}:{{ .Values.deployment.imageVersion }}
        imagePullPolicy: Always # safe to pull everytime, there may be images with same version rebuilt and pushed
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "150Mi"
            cpu: "150m"        
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
           name: catalogue


      