apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  #these labels are replicaset lables
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector: 
    # using these labels replicaset selects the pod
      matchLabels:
        project: roboshop
        tier: db
        component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        tier: db 
        component: mongodb
    spec:
      containers:
      - name: mongodb 
        image: {{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}